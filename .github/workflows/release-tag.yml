name: Release Tag

# Detects merged release PRs and creates git tags + draft GitHub releases,
# builds multi-arch binaries and deb/rpm packages, then publishes the release.

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-tag-${{ github.ref }}
  cancel-in-progress: false

env:
  SCCACHE_DIR: ${{ github.workspace }}/.sccache
  RUSTC_WRAPPER: "sccache"
  CARGO_INCREMENTAL: "0"

jobs:
  release-tag:
    name: Release tag
    runs-on: ubuntu-latest
    outputs:
      releases: ${{ steps.release-plz.outputs.releases }}
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.10
      - id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build:
    name: Build (${{ matrix.arch }})
    needs: release-tag
    if: needs.release-tag.outputs.releases_created == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-build-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}-${{ github.run_id }}
          restore-keys: |
            sccache-build-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}-
            sccache-build-${{ matrix.arch }}-
      - uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools fakeroot

      - name: Build packages
        run: cargo run --locked --bin koca -- create koca.koca --output-type all --noconfirm

      - name: Collect binary
        run: cp "koca-build/src/koca/target/$(uname -m)-unknown-linux-musl/release/koca" "koca-linux-${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.arch }}
          path: koca-linux-${{ matrix.arch }}
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.arch }}
          path: koca-out/*
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs: [release-tag, build]
    if: needs.release-tag.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*

      - uses: actions/download-artifact@v4
        with:
          pattern: packages-*

      - name: Upload assets and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ fromJson(needs.release-tag.outputs.releases)[0].tag }}
        run: |
          set -euo pipefail
          for dir in binary-*; do
            arch="${dir#binary-}"
            mv "$dir/koca-linux-${arch}" "koca-linux-${arch}"
          done
          for asset in koca-linux-x64 koca-linux-arm64 packages-*/* koca.koca; do
            gh release upload "$TAG" "$asset" --clobber
          done
          gh release edit "$TAG" --draft=false
