name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz:
    name: Release-plz
    needs: create-pr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  create-pr:
    name: Create PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Update non-Cargo versions
        if: steps.release-plz.outputs.prs_created == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ steps.release-plz.outputs.pr }}
        run: |
          set -euo pipefail

          VERSION="$(echo "$PR_JSON" | jq -r '.releases[0].version')"
          HEAD_BRANCH="$(echo "$PR_JSON" | jq -r '.head_branch')"

          git fetch origin "$HEAD_BRANCH"
          git checkout "$HEAD_BRANCH"

          jq --arg v "$VERSION" '.version = $v' npm/cli/package.json > npm/cli/package.json.tmp
          mv npm/cli/package.json.tmp npm/cli/package.json
          sed -i "s/^pkgver=.*$/pkgver=$VERSION/" koca.koca

          if git diff --quiet; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add npm/cli/package.json koca.koca
          git commit -m "chore: update non-cargo versions to $VERSION"
          git push origin "$HEAD_BRANCH"
