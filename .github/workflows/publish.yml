  publish_crates:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.tag_exists == 'false'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish koca crates
        run: cargo publish --locked --package koca && cargo publish --locked --package cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
