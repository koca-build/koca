name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      tag_exists: ${{ steps.meta.outputs.tag_exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(cargo pkgid -p koca | awk -F'#' '{print $2}')"
          TAG="v${VERSION}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

  github_release:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.tag_exists == 'false'
    permissions:
      contents: write
    container:
      image: archlinux:latest
    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git rustup fakeroot go apt rpm-tools clang

      - name: Setup Rust
        run: rustup default stable

      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix git ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: archlinux-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail
          cargo run --locked --bin koca -- create koca.koca --output-type all --noconfirm
          cargo build --locked --release --package cli --bin koca

      - name: Collect release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          shopt -s nullglob
          for pkg in ./*.deb ./*.rpm; do
            mv "$pkg" dist/
          done
          cp target/release/koca dist/koca
          ls -lh dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: koca-release-artifacts
          path: dist/*
          if-no-files-found: error

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.prepare.outputs.version }}
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true


